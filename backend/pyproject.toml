[tool.ruff]
line-length = 100
target-version = "py312"
extend-exclude = ["src/migrations"]

[tool.ruff.lint]
select = ["E", "F", "W", "I"]
ignore = ["E501"]

[tool.ruff.lint.per-file-ignores]
"tests/conftest.py" = ["E402", "F403", "F401"]
"src/models/*.py" = ["F821"]
"src/repositories/utils.py" = ["E712"]
"src/main.py" = ["E402"]

[tool.ruff.lint.isort]
known-first-party = ["src"]

