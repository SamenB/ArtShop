networks:
  artshop-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
  grafana_data:
  media_data:


services:
  # === 1. PostgreSQL Database ===
  db:
    image: postgres:15-alpine
    container_name: artshop_db
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - artshop-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # === 2. Redis Message Broker ===
  redis:
    image: redis:7-alpine
    container_name: artshop_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - artshop-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # === 3. Database Migrations (runs once and exits) ===
  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artshop_migrator
    env_file:
      - .env.prod
    command: [ "alembic", "upgrade", "head" ]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - artshop-net
    restart: "no"

  # === 4. Persistent Volume Initializer ===
  # Repairs root-owned Named Volumes before the API attempts writing as appuser
  media-init:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artshop_media_init
    user: root
    command: [ "chown", "-R", "appuser:appuser", "/app" ]
    volumes:
      - media_data:/app/static/images
    networks:
      - artshop-net
    restart: "no"

  # === 5. FastAPI Backend ===
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artshop_api
    restart: unless-stopped
    env_file:
      - .env.prod
    # Port NOT exposed to host — Nginx handles external traffic
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      media-init:
        condition: service_completed_successfully
    volumes:
      - media_data:/app/static/images
    networks:
      - artshop-net

  # === 5. Celery Worker ===
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artshop_worker
    restart: unless-stopped
    env_file:
      - .env.prod
    command: [ "celery", "-A", "src.tasks.celery_app:celery_instance", "worker", "--loglevel=info" ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
      media-init:
        condition: service_completed_successfully
    volumes:
      - media_data:/app/static/images
    networks:
      - artshop-net

  # === 6. Celery Beat (Periodic Task Scheduler) ===
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artshop_beat
    restart: unless-stopped
    env_file:
      - .env.prod
    command: [ "celery", "-A", "src.tasks.celery_app:celery_instance", "beat", "--loglevel=info" ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - artshop-net

  # === 7. Next.js Frontend ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: http://api:8000
        NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    container_name: artshop_frontend
    restart: unless-stopped
    env_file:
      - .env.prod
    # Port NOT exposed to host — Nginx handles external traffic
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - artshop-net

  # === 8. Nginx Reverse Proxy ===
  nginx:
    image: nginx:alpine
    container_name: artshop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - ./nginx/htpasswd:/etc/nginx/htpasswd:ro
    depends_on:
      - api
      - frontend
      - grafana
      - dozzle
    networks:
      - artshop-net

  # === 9. Prometheus metrics database ===
  prometheus:
    image: prom/prometheus:latest
    container_name: monitoring_prom
    restart: unless-stopped
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d' # Store metrics for 15 days
    networks:
      - artshop-net

  # === 10. Node Exporter (Server Hardware Metrics) ===
  node_exporter:
    image: prom/node-exporter:latest
    container_name: monitoring_node
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    networks:
      - artshop-net

  # === 11. Dozzle (Live Logging UI) ===
  # Note: Dozzle is protected by Nginx IP filtering (see nginx.conf)
  dozzle:
    image: amir20/dozzle:v7.0.5
    container_name: monitoring_dozzle
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - DOZZLE_BASE=/logs
    networks:
      - artshop-net

  # === 12. Grafana (Dashboard UI) ===
  grafana:
    image: grafana/grafana:latest
    container_name: monitoring_grafana
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      - GF_SERVER_ROOT_URL=https://samen-bondarenko.com/grafana/
      - GF_SERVER_SERVE_FROM_SUB_PATH=true
    networks:
      - artshop-net
