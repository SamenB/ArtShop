networks:
  artshop-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:


services:
  # === 1. PostgreSQL Database ===
  db:
    image: postgres:15-alpine
    container_name: artshop_db
    restart: unless-stopped
    env_file:
      - .env.prod
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - artshop-net
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # === 2. Redis Message Broker ===
  redis:
    image: redis:7-alpine
    container_name: artshop_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    networks:
      - artshop-net
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 5s
      retries: 5

  # === 3. Database Migrations (runs once and exits) ===
  migrator:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artshop_migrator
    env_file:
      - .env.prod
    command: [ "alembic", "upgrade", "head" ]
    depends_on:
      db:
        condition: service_healthy
    networks:
      - artshop-net
    restart: "no"

  # === 4. FastAPI Backend ===
  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artshop_api
    restart: unless-stopped
    env_file:
      - .env.prod
    # Port NOT exposed to host — Nginx handles external traffic
    expose:
      - "8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - artshop-net

  # === 5. Celery Worker ===
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artshop_worker
    restart: unless-stopped
    env_file:
      - .env.prod
    command: [ "celery", "-A", "src.tasks.celery_app:celery_instance", "worker", "--loglevel=info" ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - artshop-net

  # === 6. Celery Beat (Periodic Task Scheduler) ===
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: artshop_beat
    restart: unless-stopped
    env_file:
      - .env.prod
    command: [ "celery", "-A", "src.tasks.celery_app:celery_instance", "beat", "--loglevel=info" ]
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      migrator:
        condition: service_completed_successfully
    networks:
      - artshop-net

  # === 7. Next.js Frontend ===
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: production
      args:
        NEXT_PUBLIC_API_URL: http://api:8000
    container_name: artshop_frontend
    restart: unless-stopped
    env_file:
      - .env.prod
    # Port NOT exposed to host — Nginx handles external traffic
    expose:
      - "3000"
    depends_on:
      - api
    networks:
      - artshop-net

  # === 8. Nginx Reverse Proxy ===
  nginx:
    image: nginx:alpine
    container_name: artshop_nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
    depends_on:
      - api
      - frontend
    networks:
      - artshop-net
