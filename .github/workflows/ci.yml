# ==============================================================
# ArtShop — Continuous Integration
# Runs on every push and pull request.
# Jobs: backend-lint, frontend-lint, backend-test
# ==============================================================

name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

# Cancel redundant runs for the same branch/PR
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────
  # 1. Backend: Lint & Format
  # ────────────────────────────────────────────
  backend-lint:
    name: "Backend — Lint & Format"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install lint tools
        run: pip install ruff

      - name: Ruff — lint
        run: ruff check .

      - name: Ruff — format check
        run: ruff format --check .

  # ────────────────────────────────────────────
  # 2. Frontend: Lint & Build
  # ────────────────────────────────────────────
  frontend-lint:
    name: "Frontend — Lint & Build"
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Next.js — build
        run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000

  # ────────────────────────────────────────────
  # 3. Backend: Tests (needs DB + Redis)
  # ────────────────────────────────────────────
  backend-test:
    name: "Backend — Tests"
    runs-on: ubuntu-latest
    needs: [backend-lint]
    defaults:
      run:
        working-directory: backend

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_DB: artshop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest -v
        env:
          MODE: TEST
          POSTGRES_DB: artshop_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          DB_HOST: localhost
          DB_PORT: 5432
          REDIS_HOST: localhost
          REDIS_PORT: 6379
          JWT_SECRET_KEY: test-secret-key-for-ci
          JWT_ALGORITHM: HS256
          JWT_ACCESS_TOKEN_EXPIRE_MINUTES: 30
          ADMIN_EMAILS: '["admin@test.com", "test_admin@artshop.com"]'
