# ==============================================================
# ArtShop — Continuous Deployment
# Deploys to production server via SSH after CI passes on main.
# ==============================================================

name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types: [completed]
    branches: [main]

jobs:
  deploy:
    name: "Deploy to Production"
    runs-on: ubuntu-latest
    # Only deploy if CI passed AND it was the main branch
    if: ${{ github.event.workflow_run.conclusion == 'success' }}

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script_stop: true
          script: |
            set -e

            # ── 1. Navigate to project directory ──
            cd ~/ArtShop

            # ── 2. Pull latest code ──
            echo "📥 Pulling latest code..."
            git fetch origin main
            git reset --hard origin/main

            # ── 3. Generate htpasswd for Dozzle (Basic Auth) ──
            echo "🔑 Generating htpasswd for Nginx Basic Auth..."
            DOZZLE_PASSWORD=$(grep '^DOZZLE_PASSWORD=' ~/ArtShop/.env.prod | cut -d '=' -f2)
            echo "admin:$(openssl passwd -apr1 $DOZZLE_PASSWORD)" > ~/ArtShop/nginx/htpasswd

            # ── 3. Build and deploy ──
            # .env.prod is created manually on the server once (not overwritten)
            echo "🐳 Building and deploying..."
            docker compose --env-file .env.prod -f docker-compose.prod.yml down
            docker compose --env-file .env.prod -f docker-compose.prod.yml up --build -d

            # ── 4. Health check ──
            echo "🩺 Checking service health..."
            sleep 10
            docker compose -f docker-compose.prod.yml ps

            # ── 5. Cleanup ──
            echo "🧹 Cleaning up old images..."
            docker image prune -f

            echo "✅ Deployment complete!"
