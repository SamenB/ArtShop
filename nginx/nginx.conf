# ==============================================================
# ArtShop — Nginx Reverse Proxy Configuration
# Domain: samen-bondarenko.com
# ==============================================================

# ── Rate limiting zones ──
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── Upstream definitions ──
upstream backend {
    server api:8000;
}

upstream frontend {
    server frontend:3000;
}

# ── HTTP → HTTPS redirect ──
server {
    listen 80;
    server_name samen-bondarenko.com www.samen-bondarenko.com;
    return 301 https://$host$request_uri;
}

# ── HTTPS server ──
server {
    listen 443 ssl http2;
    server_name samen-bondarenko.com www.samen-bondarenko.com;

    # ── SSL ──
    ssl_certificate     /etc/letsencrypt/live/samen-bondarenko.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/samen-bondarenko.com/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Client limits ──
    client_max_body_size 100M;

    # ── FastAPI Backend API ──
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Static files served by FastAPI ──
    location /static/ {
        proxy_pass http://backend/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Swagger / OpenAPI docs — RESTRICTED in production ──
    location /docs {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://backend/openapi.json;
        proxy_set_header Host $host;
    }

    location /redoc {
        allow 127.0.0.1;
        deny all;
        proxy_pass http://backend/redoc;
        proxy_set_header Host $host;
    }

    # ── Grafana Monitoring UI ──
    location /grafana/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Grafana WebSockets for live metrics
    location /grafana/api/live/ {
        proxy_pass http://grafana:3000;
        proxy_set_header Host $http_host;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Dozzle Live Logs UI (password protected) ──
    location /logs/ {
        # HTTP Basic Auth — credentials generated from DOZZLE_PASSWORD GitHub Secret
        auth_basic "Restricted Area";
        auth_basic_user_file /etc/nginx/htpasswd;

        proxy_pass http://dozzle:8080/;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Required for Dozzle SSE (Server-Sent Events) streaming
        proxy_buffering off;
        proxy_cache off;
        proxy_read_timeout 3600s;
    }

    # ── Next.js Frontend (catch-all) ──
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Next.js static assets ──
    location /_next/static/ {
        proxy_pass http://frontend/_next/static/;

        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Health check endpoint ──
    location /health {
        access_log off;
        return 200 '{"status": "ok"}';
        add_header Content-Type application/json;
    }
}
