# ==============================================================
# ArtShop — Nginx Reverse Proxy Configuration
# Proxies requests to FastAPI (api) and Next.js (frontend)
# ==============================================================

# ── Rate limiting zones ──
# Protect API from abuse: 10 requests/sec per IP, burst up to 20
limit_req_zone $binary_remote_addr zone=api_limit:10m rate=10r/s;

# ── Upstream definitions ──
upstream backend {
    server api:8000;
}

upstream frontend {
    server frontend:3000;
}

server {
    listen 80;
    server_name _;  # Replace with your domain: server_name your-domain.com;

    # ── Security Headers ──
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    # add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;  # Uncomment after enabling HTTPS

    # ── Gzip Compression ──
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1000;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml
        font/woff2;

    # ── Client limits ──
    client_max_body_size 10M;  # For artwork image uploads

    # ── FastAPI Backend API ──
    location /api/ {
        limit_req zone=api_limit burst=20 nodelay;

        proxy_pass http://backend/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts for long-running requests (e.g. image processing)
        proxy_read_timeout 120s;
        proxy_connect_timeout 10s;
    }

    # ── Static files served by FastAPI ──
    location /static/ {
        proxy_pass http://backend/static/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;

        # Cache static assets aggressively
        proxy_cache_valid 200 1h;
        add_header Cache-Control "public, max-age=3600";
    }

    # ── Swagger / OpenAPI docs ──
    location /docs {
        proxy_pass http://backend/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    location /openapi.json {
        proxy_pass http://backend/openapi.json;
        proxy_set_header Host $host;
    }

    location /redoc {
        proxy_pass http://backend/redoc;
        proxy_set_header Host $host;
    }

    # ── Next.js Frontend (catch-all) ──
    location / {
        proxy_pass http://frontend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support (needed for Next.js HMR in dev, harmless in prod)
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }

    # ── Next.js static assets ──
    location /_next/static/ {
        proxy_pass http://frontend/_next/static/;

        # Immutable — Next.js hashes filenames, safe to cache forever
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ── Health check endpoint for monitoring ──
    location /health {
        access_log off;
        return 200 '{"status": "ok"}';
        add_header Content-Type application/json;
    }
}

# ── HTTPS configuration (uncomment after obtaining SSL certificate) ──
# To obtain a certificate with Let's Encrypt:
#   1. Make sure port 80 is accessible from the internet
#   2. Run: docker exec artshop_nginx certbot --nginx -d your-domain.com
#   Or use standalone: certbot certonly --standalone -d your-domain.com
#
# server {
#     listen 443 ssl http2;
#     server_name your-domain.com;
#
#     ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
#     ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;
#     ssl_protocols       TLSv1.2 TLSv1.3;
#     ssl_ciphers         HIGH:!aNULL:!MD5;
#     ssl_prefer_server_ciphers on;
#
#     # ... same location blocks as above ...
# }
#
# Redirect HTTP → HTTPS (replace the listen 80 server block with):
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$host$request_uri;
# }
